<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro YGO Simulator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>

    <div id="main-menu">
      <h1 id="menu-title">RETRO DUEL</h1>
      <div class="menu-btn" id="btn-start-duel">START DUEL</div>
    </div>

    <div id="ui-layer">
      <div id="info-panel">
        <div id="info-art"><div id="info-art-placeholder">?</div></div>
        <div id="info-name">Hover a card</div>
        <div id="info-stats"></div>
        <div id="info-desc"></div>
      </div>

      <div id="hud-p2" class="hud-box">
        <div class="hud-name">OPPONENT</div>
        <div class="hud-lp" id="p2-lp">LP: 8000</div>
      </div>

      <div id="hud-p1" class="hud-box">
        <div class="hud-name">YOU</div>
        <div class="hud-lp" id="p1-lp">LP: 8000</div>
      </div>

      <div id="contextMenu">
        <div class="menu-btn" id="btnNormalSummon">Normal Summon</div>
      </div>
    </div>

    <script src="render.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>
